site_name: My Digital Brain
site_description: Personal knowledge base and documentation
site_author: Your Name

theme:
  name: material
  palette:
    # Light mode - Warm Editorial (DESIGN.md §20.1)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode - Near-Black Craft Tool (DESIGN.md §20.2)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false  # Use system fonts per DESIGN.md stack-agnostic rule
  features:
    # Remove navigation.tabs for scalability
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path  # Show breadcrumb path
    - navigation.prune  # Only render visible navigation (performance)
    - toc.follow  # Sidebar TOC follows scroll
    - toc.integrate  # Integrate TOC into sidebar
    - search.suggest
    - search.highlight
    - search.share  # Share search results
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'  # Better search tokenization
  - awesome-pages

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/design-tokens.css

extra:
  generator: false  # Remove "Made with Material for MkDocs" footer

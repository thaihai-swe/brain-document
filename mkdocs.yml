site_name: My Digital Brain
site_description: Personal knowledge base and documentation
site_author: Your Name

theme:
  name: material
  palette:
    # Light mode - Warm Editorial (DESIGN.md §20.1)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode - Near-Black Craft Tool (DESIGN.md §20.2)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false  # Use system fonts per DESIGN.md stack-agnostic rule
  features:
    # Navigation - Left sidebar for folder structure
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path  # Show breadcrumb path
    - navigation.prune  # Only render visible navigation (performance)
    # TOC - Right sidebar for page structure (removed toc.integrate)
    - toc.follow  # Right sidebar TOC follows scroll
    # Search
    - search.suggest
    - search.highlight
    - search.share  # Share search results
    # Content
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'  # Better search tokenization
  - roamlinks  # Obsidian-style [[wiki-links]] - must be BEFORE awesome-pages
  - awesome-pages
  - blog:
      blog_dir: blog
      blog_toc: true
      post_dir: "{blog}/posts"
      post_date_format: medium
      post_url_format: "{date}/{slug}"
      post_excerpt: required
      post_excerpt_max_authors: 2
      post_readtime: true
      post_readtime_words_per_minute: 200
      archive: true
      archive_name: Archive
      archive_date_format: MMMM yyyy
      archive_url_format: "archive/{date}"
      categories: true
      categories_name: Categories
      categories_toc: true
      authors: true
      authors_file: "{blog}/.authors.yml"
      pagination: true
      pagination_per_page: 10
      draft: true
      draft_on_serve: true
      draft_if_future_date: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
        remove_empty_space: true
        reduce_boolean_attributes: true
      cache_safe: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/design-tokens.css

extra:
  generator: false  # Remove "Made with Material for MkDocs" footer

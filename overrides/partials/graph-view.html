<!-- Graph View Button -->
<button
  class="md-graph-button"
  onclick="toggleGraphView()"
  title="Graph View (G)"
  aria-label="Open graph view">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    <circle cx="12" cy="12" r="3" fill="currentColor"/>
    <circle cx="6" cy="6" r="2" fill="currentColor"/>
    <circle cx="18" cy="6" r="2" fill="currentColor"/>
    <circle cx="6" cy="18" r="2" fill="currentColor"/>
    <circle cx="18" cy="18" r="2" fill="currentColor"/>
  </svg>
</button>

<!-- Graph View Modal -->
<div id="graph-modal" class="md-graph-modal" style="display: none;">
  <div class="md-graph-container">
    <div class="md-graph-header">
      <h2>Knowledge Graph</h2>
      <button onclick="toggleGraphView()" class="md-graph-close" aria-label="Close graph view">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="md-graph-controls">
      <button onclick="resetGraph()" title="Reset view">Reset</button>
      <button onclick="centerCurrentPage()" title="Center current page">Center Current</button>
      <label>
        <input type="range" id="link-distance" min="30" max="200" value="100" oninput="updateLinkDistance(this.value)">
        Link Distance
      </label>
    </div>
    <svg id="graph-canvas"></svg>
  </div>
</div>

<style>

  position: fixed;
  bottom: 20px;
  right: 20px;

  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: transform 0.2s, box-shadow 0.2s;
}

  box-shadow: 0 6px 16px rgba(0,0,0,0.2);
}

  color: white;
}

  align-items: center;
  justify-content: center;
}

.md-graph-container {
  width: 90%;
  height: 90%;
  background: var(--md-default-bg-color, #FAFAF8);

  flex-direction: column;
  overflow: hidden;
}

  display: flex;

}

  border-radius: 4px;

  justify-content: center;

.md-graph-close:hover {
  background: var(--md-default-fg-color--lightest, #F4F4F1);

[data-md-color-scheme="slate"] .md-graph-header h2,

}
</style>
